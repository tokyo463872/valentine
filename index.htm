<!DOCTYPE html>
<html>

<head>
<title>Will you be my Valentine?</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&display=swap" rel="stylesheet">

<style>

body{
background:#ffc0cb;
overflow:hidden;
text-align:center;
font-family:'Cinzel',serif;
margin:0;
}

/* floating hearts background */
.heart{
position:absolute;
color:#ff69b4;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:1;}
100%{transform:translateY(-10vh);opacity:0;}
}

/* title */
h1{
font-size:50px;
font-weight:bold;
margin-top:60px;
}

/* floating letters */
h1 span{
display:inline-block;
animation:floatLetter 3s ease-in-out infinite;
}

@keyframes floatLetter{
0%{transform:translateY(0px);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0px);}
}

/* image */
img{
width:250px;
margin-top:30px;
border-radius:20px;
}

/* buttons */

button{
font-family:'Cinzel',serif;
font-size:20px;
letter-spacing:2px;
padding:12px 30px;
border-radius:12px;
border:3px solid purple;
background:pink;
cursor:pointer;
position:absolute;
}

#yes{
left:45%;
top:70%;
}

#no{
left:55%;
top:70%;
}

.cursorHeart{
position:absolute;
pointer-events:none;
font-size:15px;
animation:fade 1s linear forwards;
}

@keyframes fade{
0%{opacity:1;}
100%{opacity:0; transform:translateY(-20px);}
}

</style>
</head>

<body>

<h1 id="title"></h1>

<img src="yourimage.jpg">

<button id="yes">YES</button>
<button id="no">NO</button>

<script>

/* floating letters */
let text="Will you be my Valentine?";
let title=document.getElementById("title");

text.split("").forEach(letter=>{
let span=document.createElement("span");
span.innerHTML=letter;
span.style.animationDelay=Math.random()*2+"s";
title.appendChild(span);
});

/* hearts background */

function createHeart(){
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=Math.random()*20+10+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);
}

setInterval(createHeart,200);

/* no button runs away */

let no=document.getElementById("no");

no.addEventListener("mouseover",()=>{

let x=Math.random()*window.innerWidth;
let y=Math.random()*window.innerHeight;

no.style.left=x+"px";
no.style.top=y+"px";

});

/* yes button follows cursor */

let yes=document.getElementById("yes");

document.addEventListener("mousemove",(e)=>{
yes.style.left=(e.clientX+20)+"px";
yes.style.top=(e.clientY+20)+"px";
});

/* hearts on click */

document.addEventListener("click",(e)=>{

for(let i=0;i<10;i++){

let heart=document.createElement("div");

heart.className="cursorHeart";
heart.innerHTML="❤";

heart.style.left=e.clientX+"px";
heart.style.top=e.clientY+"px";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),1000);

}

});

/* yes redirect */

yes.onclick=function(){
window.location.href="yay.html";
}

/* hearts following cursor */

document.addEventListener("mousemove",(e)=>{

let heart=document.createElement("div");
heart.className="cursorHeart";
heart.innerHTML="❤";

heart.style.left=e.clientX+"px";
heart.style.top=e.clientY+"px";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),800);

});

</script>

</body>
</html>
